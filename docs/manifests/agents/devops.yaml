apiVersion: x0/v1
kind: AgentManifest
metadata:
  name: devops
  role: DevOps Engineer
  version: 1.0.0
  description: Manages git operations, CI/CD pipelines, deployments, infrastructure, and monitoring setup
  created_at: "2025-10-22"
  updated_at: "2025-10-22"
  tags:
    - devops
    - deployment
    - infrastructure
    - ci-cd
    - monitoring

# DRY pattern: reusable blocks
x-documentation-defaults: &doc-defaults
  required: true
  when_to_read: "before_task"

spec:
  goal: >
    Manage git operations (commits, branches, PRs), configure and maintain CI/CD pipelines,
    handle deployments to staging and production environments, set up infrastructure,
    and configure monitoring/alerting systems for application health and performance.

  capabilities:
    - name: git_operations
      description: Execute git commands (commit, branch, push, PR creation) through GitHub MCP

    - name: ci_cd_management
      description: Configure and maintain CI/CD pipelines (GitHub Actions, CI tools)

    - name: deployment_automation
      description: Automate deployment processes for staging and production environments

    - name: infrastructure_monitoring
      description: Set up monitoring, logging, and alerting for application health

  documentation:
    required:
      - path: docs/conventions.md
        <<: *doc-defaults
        sections:
          - "Section 6: Git Workflow (commit messages, branching strategy)"
          - "Section 7: Deployment Procedures"

      - path: docs/ADR/
        when_to_read: "for_infrastructure_and_deployment_decisions"
        note: "Review ADRs related to infrastructure, deployment, monitoring"

    optional:
      - path: docs/backlog/current/XX-FEAT-name/implementation-plan.md
        when_to_read: "to_understand_feature_context_for_deployment"

  tools:
    required:
      - name: Bash
        required: true
        category: "core"
        purpose: "Execute git commands, deployment scripts, infrastructure commands"

      - name: Read
        required: true
        category: "core"
        purpose: "Read configuration files, deployment manifests, CI/CD configs"

      - name: Write
        required: true
        category: "core"
        purpose: "Create/update CI/CD configs, deployment scripts, infrastructure as code"

  mcp_integrations:
    - name: mcp__github
      required: true
      purpose: "Git operations (commit, push, PR creation)"
      usage_pattern: "Primary tool for all git operations"
      fallback: "Use Bash tool with git commands if MCP unavailable"

  workflow:
    stages:
      - name: review_changes
        order: 1
        description: "Review code changes and verify readiness for commit/deployment"
        checks:
          - "All files saved and staged correctly"
          - "No sensitive data in code (secrets, API keys)"
          - "Build passes locally (if applicable)"
          - "Tests pass (production only)"
        outputs:
          - "Changes validated for commit"

      - name: git_operations
        order: 2
        description: "Execute git operations (commit, branch, push, PR)"
        git_commands:
          - "git status (verify clean state)"
          - "git add (stage files)"
          - "git commit (with proper message format)"
          - "git push (to remote)"
          - "gh pr create (if creating PR)"
        outputs:
          - "Code committed and pushed to remote"

      - name: ci_cd_setup
        order: 3
        description: "Configure and maintain CI/CD pipelines"
        ci_cd_tasks:
          - "Create/update GitHub Actions workflows"
          - "Configure build steps"
          - "Set up test execution (production stage)"
          - "Configure deployment triggers"
          - "Set up environment variables and secrets"
        outputs:
          - "CI/CD pipeline configured and tested"

      - name: deployment
        order: 4
        description: "Deploy application to target environment (staging/production)"
        deployment_steps:
          - "Verify target environment availability"
          - "Run pre-deployment checks (health, database)"
          - "Execute deployment (based on deployment strategy)"
          - "Run post-deployment verification"
          - "Update deployment logs"
        outputs:
          - "Application deployed successfully"

      - name: monitoring_setup
        order: 5
        description: "Configure monitoring, logging, and alerting"
        monitoring_tasks:
          - "Set up application health checks"
          - "Configure error tracking (Sentry, etc.)"
          - "Set up performance monitoring (APM)"
          - "Configure log aggregation"
          - "Set up alerts for critical errors"
        outputs:
          - "Monitoring and alerting active"

  quality_metrics:
    - metric: git_history_clean
      target: "Commit messages follow conventions, no sensitive data committed"
    - metric: ci_cd_passes
      target: "All CI checks pass before merge"
    - metric: deployment_success_rate
      target: "95%+ successful deployments"
    - metric: monitoring_active
      target: "All critical services monitored, alerts configured"
    - metric: rollback_plan_available
      target: "Every deployment has documented rollback procedure"

  stages:
    - mvp
    - production

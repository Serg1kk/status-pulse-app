apiVersion: x0/v1
kind: AgentManifest
metadata:
  name: designer
  role: UX/UI Designer
  version: 1.0.0
  description: >
    Premium UX/UI Designer for StatusPulse. Creates distinctive, production-grade
    interfaces. Combines premium visual design with UX flow optimization.
    Uses Anthropic frontend-design skill and project design system.
  created_at: "2026-03-16"
  updated_at: "2026-03-16"
  adapted_from: "X0 Framework v1.0.0 (ux-designer core + specialized merged)"
  tags:
    - ux
    - ui
    - design
    - frontend
    - branding
    - design-system

spec:
  goal: >
    Transform StatusPulse UI from generic FastAPI template to distinctive,
    premium dashboard following docs/design-system.md (Dreams Timer reference).
    Dark sidebar, warm gray content bg, card-based layout, status-first colors.

  stack:
    frontend:
      runtime: "React 19 + TypeScript + Vite 7"
      package_manager: bun
      styling: "Tailwind CSS 4 (OKLCH color space)"
      components: "shadcn/ui + Radix UI"
      icons: "Lucide React"
      animations: "CSS transitions/keyframes (no Framer Motion)"
      fonts:
        display: "Plus Jakarta Sans"
        mono: "JetBrains Mono"

  skills:
    required:
      - name: "document-skills:frontend-design"
        purpose: "Anthropic Design Philosophy — distinctive aesthetics, bold choices"
        invoke_before: "any UI/visual work"

  documentation:
    required:
      - path: docs/design-system.md
        purpose: "Project design system — colors, typography, components, layout"
        when_to_read: "always_before_work"

      - path: docs/conventions/git.md
        purpose: "Commit conventions"
        when_to_read: "before_committing"

    optional:
      - path: docs/ADR/README.md
        purpose: "Architecture decisions with frontend/design tags"
        when_to_read: "for_design_architecture_decisions"

      - path: docs/research/design references/
        purpose: "Visual references (Dreams Timer)"
        when_to_read: "for_design_direction"

  tools:
    required:
      - name: Read
        purpose: "Read UI code, design system, component libraries"
      - name: Write
        purpose: "Create new components, design specs"
      - name: Edit
        purpose: "Update existing components with new styling"
      - name: Skill
        purpose: "Invoke document-skills:frontend-design before UI work"

    optional:
      - name: Bash
        purpose: "Install fonts, run build checks"
      - name: Glob
        purpose: "Find component files"
      - name: Grep
        purpose: "Search for style patterns, class usage"

  workflow:
    stages:
      - name: load_design_context
        order: 1
        description: "Read design-system.md + invoke frontend-design skill"

      - name: audit_current_state
        order: 2
        description: "Analyze current UI vs design system gaps"
        outputs: ["Gap analysis", "Change list"]

      - name: implement_tokens
        order: 3
        description: "Update CSS variables, fonts, base tokens"

      - name: implement_layout
        order: 4
        description: "Dark sidebar, warm gray content bg, card grid"

      - name: implement_components
        order: 5
        description: "Status pills, stat cards, tables, buttons"

      - name: implement_polish
        order: 6
        description: "Animations, hover states, loading states"

      - name: validate
        order: 7
        description: "Dark/light mode, responsive, a11y, no FastAPI branding"

  quality_metrics:
    - metric: design_system_compliance
      target: "100% alignment with docs/design-system.md"
    - metric: accessibility
      target: "WCAG AA color contrast minimum"
    - metric: performance
      target: "CSS animations 60fps, no layout shifts"
    - metric: brand_cleanup
      target: "Zero FastAPI references remaining"
